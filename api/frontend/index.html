<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yörünge Temizliği</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0a0e1a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
  .card { background: #111827; border: 1px solid #1f2937; }
  .red-glow { box-shadow: 0 0 20px rgba(239,68,68,0.3); border-color: #ef4444; }
  .orange-glow { box-shadow: 0 0 15px rgba(249,115,22,0.25); border-color: #f97316; }
  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .tier-bar { height: 6px; border-radius: 3px; }
  pre { white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body class="min-h-screen p-6">

<!-- Header -->
<div class="max-w-6xl mx-auto">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-white">🛰 Yörünge Temizliği</h1>
      <p class="text-slate-400 mt-1">Türk Uyduları Uzay Moloz Çarpışma Risk Takibi</p>
    </div>
    <div class="flex items-center gap-4">
      <div id="status-badge" class="px-4 py-2 rounded-full text-sm font-medium bg-slate-700 text-slate-300">
        Yükleniyor...
      </div>
      <button id="run-btn" onclick="runPipeline()"
        class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-medium transition-colors">
        ▶ Pipeline Çalıştır
      </button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-cols-4 gap-4 mb-8" id="summary-cards">
    <div class="card rounded-xl p-5 text-center">
      <div class="text-4xl font-bold text-red-400" id="cnt-red">—</div>
      <div class="text-slate-400 mt-1">🔴 RED</div>
    </div>
    <div class="card rounded-xl p-5 text-center">
      <div class="text-4xl font-bold text-orange-400" id="cnt-orange">—</div>
      <div class="text-slate-400 mt-1">🟠 ORANGE</div>
    </div>
    <div class="card rounded-xl p-5 text-center">
      <div class="text-4xl font-bold text-yellow-400" id="cnt-yellow">—</div>
      <div class="text-slate-400 mt-1">🟡 YELLOW</div>
    </div>
    <div class="card rounded-xl p-5 text-center">
      <div class="text-4xl font-bold text-green-400" id="cnt-green">—</div>
      <div class="text-slate-400 mt-1">🟢 GREEN</div>
    </div>
  </div>

  <!-- Model Info -->
  <div class="card rounded-xl p-4 mb-8 flex items-center gap-8" id="model-bar">
    <div><span class="text-slate-400 text-sm">Model</span><div class="font-mono text-white" id="model-ver">—</div></div>
    <div><span class="text-slate-400 text-sm">AUC-ROC</span><div class="font-bold text-blue-400" id="model-auc">—</div></div>
    <div><span class="text-slate-400 text-sm">LSTM</span><div class="font-bold text-purple-400" id="model-lstm">—</div></div>
    <div><span class="text-slate-400 text-sm">Eğitim Zamanı</span><div class="text-slate-300 text-sm" id="model-trained">—</div></div>
    <div><span class="text-slate-400 text-sm">Son Skorlama</span><div class="text-slate-300 text-sm" id="scored-at">—</div></div>
  </div>

  <!-- Alert Events -->
  <div class="mb-8">
    <h2 class="text-xl font-semibold text-white mb-4">Yüksek Riskli Yaklaşmalar</h2>
    <div id="events-list" class="space-y-3">
      <div class="text-slate-500 text-center py-8">Veri yükleniyor...</div>
    </div>
  </div>

  <!-- Pipeline Log -->
  <div class="card rounded-xl p-4" id="log-section" style="display:none">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-semibold text-white">Pipeline Log</h3>
      <button onclick="document.getElementById('log-section').style.display='none'"
        class="text-slate-400 hover:text-white">✕</button>
    </div>
    <pre class="text-xs text-slate-300 max-h-64 overflow-y-auto" id="log-content"></pre>
  </div>
</div>

<script>
const TIER_COLORS = {
  RED:    { bg: 'bg-red-900/40',    border: 'border-red-500',    text: 'text-red-400',    bar: 'bg-red-500'    },
  ORANGE: { bg: 'bg-orange-900/30', border: 'border-orange-500', text: 'text-orange-400', bar: 'bg-orange-500' },
  YELLOW: { bg: 'bg-yellow-900/20', border: 'border-yellow-500', text: 'text-yellow-400', bar: 'bg-yellow-500' },
  GREEN:  { bg: 'bg-green-900/10',  border: 'border-green-700',  text: 'text-green-400',  bar: 'bg-green-500'  },
};

const SATELLITE_NAMES = {
  39522: 'Türksat 4A', 40985: 'Türksat 4B',
  47790: 'Türksat 5A', 49077: 'Türksat 5B',
  41875: 'GÖKTÜRK-1',  38704: 'GÖKTÜRK-2',
  37791: 'RASAT',       55491: 'İMECE',
};

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) return null;
  return r.json();
}

async function loadStatus() {
  const s = await fetchJSON('/api/status');
  if (!s) return;
  const badge = document.getElementById('status-badge');
  if (s.running) {
    badge.textContent = '⚡ Çalışıyor...';
    badge.className = 'px-4 py-2 rounded-full text-sm font-medium bg-blue-700 text-blue-100 pulse';
  } else if (s.last_status === 'success') {
    badge.textContent = '✓ Hazır';
    badge.className = 'px-4 py-2 rounded-full text-sm font-medium bg-green-800 text-green-200';
  } else if (s.last_status === 'error') {
    badge.textContent = '✗ Hata';
    badge.className = 'px-4 py-2 rounded-full text-sm font-medium bg-red-800 text-red-200';
  } else {
    badge.textContent = '○ Bekleniyor';
    badge.className = 'px-4 py-2 rounded-full text-sm font-medium bg-slate-700 text-slate-300';
  }
}

async function loadScores() {
  const data = await fetchJSON('/api/latest-scores');
  if (!data) return;

  const tc = data.tier_counts || {};
  document.getElementById('cnt-red').textContent    = tc.RED    || 0;
  document.getElementById('cnt-orange').textContent = tc.ORANGE || 0;
  document.getElementById('cnt-yellow').textContent = tc.YELLOW || 0;
  document.getElementById('cnt-green').textContent  = tc.GREEN  || 0;
  document.getElementById('scored-at').textContent  = data.scored_at_utc ? new Date(data.scored_at_utc).toLocaleString('tr-TR') : '—';

  const events = (data.scored_conjunctions || [])
    .filter(e => e.final_tier !== 'GREEN')
    .sort((a, b) => {
      const order = {RED:0, ORANGE:1, YELLOW:2, GREEN:3};
      return (order[a.final_tier]||3) - (order[b.final_tier]||3);
    });

  const container = document.getElementById('events-list');
  if (!events.length) {
    container.innerHTML = '<div class="text-slate-500 text-center py-8">Aktif risk eventi bulunmuyor</div>';
    return;
  }

  container.innerHTML = events.map(ev => {
    const tier  = ev.final_tier;
    const c     = TIER_COLORS[tier] || TIER_COLORS.GREEN;
    const satName = SATELLITE_NAMES[ev.turkish_norad_id] || `NORAD ${ev.turkish_norad_id}`;
    const score = ev.ml_score != null ? ev.ml_score : 0;
    const scorePct = Math.round(score * 100);
    const tca = ev.tca_utc ? new Date(ev.tca_utc).toLocaleString('tr-TR') : '—';
    const miss = ev.miss_distance_km != null ? ev.miss_distance_km.toFixed(3) : '—';
    const vel  = ev.relative_velocity_km_s != null ? ev.relative_velocity_km_s.toFixed(3) : '—';
    const shap = (ev.top_shap_features || []).slice(0,3).map(f => f.label || f.feature).join(', ');
    const override = ev.tier_override ? '<span class="text-xs bg-purple-800 text-purple-200 px-2 py-0.5 rounded ml-2">ML Override</span>' : '';
    const isNew = tier === 'RED' ? '<span class="text-xs bg-red-700 text-red-100 px-2 py-0.5 rounded ml-2 pulse">YENİ</span>' : '';

    return `
    <div class="card rounded-xl p-5 border ${c.border} ${tier === 'RED' ? 'red-glow' : tier === 'ORANGE' ? 'orange-glow' : ''}">
      <div class="flex items-start justify-between">
        <div>
          <span class="font-bold text-lg ${c.text}">${tier}</span>
          ${isNew}${override}
          <span class="text-white font-semibold ml-3">${satName}</span>
          <span class="text-slate-400 ml-2">× NORAD ${ev.debris_norad_id}</span>
        </div>
        <div class="text-right">
          <div class="text-2xl font-bold ${c.text}">${scorePct}<span class="text-sm font-normal">/100</span></div>
          <div class="text-slate-400 text-xs">ML Risk Skoru</div>
        </div>
      </div>
      <div class="tier-bar ${c.bar} mt-3" style="width:${scorePct}%"></div>
      <div class="grid grid-cols-3 gap-4 mt-4 text-sm">
        <div><span class="text-slate-400">TCA:</span> <span class="text-white">${tca}</span></div>
        <div><span class="text-slate-400">Miss Distance:</span> <span class="text-white">${miss} km</span></div>
        <div><span class="text-slate-400">Hız:</span> <span class="text-white">${vel} km/s</span></div>
      </div>
      ${shap ? `<div class="mt-2 text-xs text-slate-400">📊 Risk Faktörleri: <span class="text-slate-300">${shap}</span></div>` : ''}
    </div>`;
  }).join('');
}

async function loadModelInfo() {
  const data = await fetchJSON('/api/model-info');
  if (!data) return;
  if (data.manifest) {
    document.getElementById('model-ver').textContent   = data.manifest.version || '—';
    document.getElementById('model-auc').textContent   = data.manifest.test_auc_roc ? data.manifest.test_auc_roc.toFixed(4) : '—';
    document.getElementById('model-lstm').textContent  = data.manifest.lstm_included ? 'Aktif' : 'Pasif';
  }
  if (data.meta) {
    const t = data.meta.trained_at ? new Date(data.meta.trained_at).toLocaleString('tr-TR') : '—';
    document.getElementById('model-trained').textContent = t;
  }
}

async function runPipeline() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Başlatılıyor...';

  const r = await fetch('/api/run-pipeline', { method: 'POST' });
  if (r.ok) {
    document.getElementById('log-section').style.display = 'block';
    pollLog();
  } else {
    const err = await r.json();
    alert(err.detail || 'Hata oluştu');
    btn.disabled = false;
    btn.textContent = '▶ Pipeline Çalıştır';
  }
}

async function pollLog() {
  const data = await fetchJSON('/api/pipeline-log');
  if (data) {
    document.getElementById('log-content').textContent = data.log.join('\n');
  }
  const status = await fetchJSON('/api/status');
  if (status && status.running) {
    setTimeout(pollLog, 2000);
  } else {
    const btn = document.getElementById('run-btn');
    btn.disabled = false;
    btn.textContent = '▶ Pipeline Çalıştır';
    loadAll();
  }
}

async function loadAll() {
  await Promise.all([loadStatus(), loadScores(), loadModelInfo()]);
}

loadAll();
setInterval(loadStatus, 5000);
</script>
</body>
</html>
